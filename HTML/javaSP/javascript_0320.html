<hr>
	
	<div id="digClock01"></div>
	<button onclick="test()">클릭</button>
	<button onclick="click_()">시작</button>	
	<button onclick="end()">종료</button>	
	<script>
	// 자기 자신을 호출하는 스택 함수
	var e; var cnt=1;
	function click_(){
		e = setInterval(digClock, 1000);
	}
	function digClock(){
		var today = new Date();
		var day = today.getMonth()+1 + "월" + today.getDate()+"일";
		var time = today.getHours()+"시" + today.getMinutes()+"분"+today.getSeconds()+"초";
		document.getElementById("digClock01").innerHTML= day + time;
		e= setTimeout('digClock()',1000);		
	}
	function test(){
		console.log("클릭클릭!!!!"+cnt++);
	}
	function end() {clearTimeout(e);}
	function endc() {clearInterval(e);}
	digClock();
	</script>

<hr>

	<script>
		var kdata = [ '서울', '부산', '청주','세종'];
		function printArr(item, index){
			document.write("배열 데이터 [ "+index +"] : "+item+"<br>");
		}
		kdata.forEach(printArr);
	</script>

<hr>
	
	<script>
		var kdata = [ '서울', '부산'];
		var p1=kdata.unshift('청주','세종');
		document.write("데이터 : "+p1+"<p/>");
		document.write("배열 데이터 : "+kdata+"<p/>");
		var p2=kdata.shift();
		document.write("데이터 : "+p2+"<p/>");
		document.write("배열 데이터 : "+kdata+"<p/>");
	</script>

<hr>
	<p id="kdata01"></p>
	<button onclick="push_()">push</button>
	<button onclick="pop_()">pop</button><br>	
	<script>
		var cdata = [ '서울', '부산', '구포', '대구', '인천', '대전'];
		var pdata = [ '서울', '부산', '구포', '대구', '인천', '대전', '청주','세종'];
		
		document.getElementById("kdata01").innerHTML = cdata;
		var cnt=6;
		document.write("배열 데이터 : "+cdata+"<p/>");
		
		function pop_(){
			var p2 = cdata.pop();
			document.getElementById("kdata01").innerHTML = cdata;
			cnt--;
		}
		function push_(){
			var p1;
			p1 = cdata.push(pdata[cnt]);
			cnt++;
			document.getElementById("kdata01").innerHTML = cdata;
		}
	</script>

<hr>
	
	<script>
		var kdata = [ '서울', '부산', '구포', '대구', '인천', '대전', '세종'];
		var str1 = kdata.slice(0,4);
		var str2 = kdata.slice(2,-1);
		var str3 = kdata.slice(-4,-2);
		// 배열의 -옵션은 배열의 끝에서부터 어디까지의 값만 도출하겠다는 뜻이다.
		document.write("부분 배열1 : "+str1+"<p/>");
		document.write("부분 배열2 : "+str2+"<p/>");
		document.write("부분 배열3 : "+str3+"<p/>");
	</script>
