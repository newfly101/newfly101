<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Drag and Drop</title>
<script src="jquery-3.4.1.min.js"></script>
<script src="jquery-1.12.1-ui.js"></script>
<script>
	$(function (){
		$("#draggable").draggable();
	});
</script>
<style type="text/css">
	.drag {width: 200px; height: 100px; padding: 0.5em; background-color: red; border-style: solid;}
</style>
</head>
<body>
	<div id="draggable" class="drag">
		<p>Drag me around</p>
	</div>
</body>
</html>
