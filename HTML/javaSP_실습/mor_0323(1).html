<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>계정 등록 페이지</title>
<script type="text/javascript">
	function test(){
		window.open("../javaSP_실습/mor_0323(2).html");
	}
	function pwchk() {
		inPut = document.getElementById("pwInput").value;
		inPut2 = document.getElementById("pwOutput").value;
		if(inPut==inPut2){
			document.getElementById("checkpw").value = "확인!!"
		}else{
			document.getElementById("checkpw").value = "비밀번호틀림!!"
			document.getElementById("pwInput").value ="";
			document.getElementById("pwOutput").value="";
		}
	}
	function joinchk(){
		pwchk();
		var check = document.getElementById("pwInput").value;
		if(check=="확인!!"){
			test();
		}
	}
</script>
</head>
<body>
	<h1> 계정 등록 페이지 입니다.</h1>
	<br>
	<form id="newPG" action=mor_0323(2).html">
		<input type="text" placeholder="아이디" id="userid">
		<font style="font-size: 12pt;" color="red"><b>(*필수 항목)</b></font><br>
		<input type="password" placeholder="비밀번호" id="pwInput" onchange="pwchk()">
		<font style="font-size: 12pt;" color="red"><b>(*필수 항목)</b></font><br>
		<input type="text" placeholder="비밀번호 확인" id="pwOutput">
		<span id="">
			<font style="font-size: 12pt;"><b>확인!!!</b></font><br>
		</span>
		
		<input type="text" placeholder="이름" id="username"><br>
	<hr>
	<input type="button" value="등록" onclick="joinchk()">	
	</form>
</body>
</html>
