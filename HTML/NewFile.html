<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<a href="http://www.naver.com">네이버이동</a>
<!-- 현재 페이지에서 링크로 이동한다. -->
<a href="http://www.naver.com" target="_blank">네이버이동</a>
<!-- target 새로운 창을 띄우면서 링크로 이동한다. -->
<a href="http://www.naver.com" title="네이버인척하는 html">네이버이동</a>
<!-- title 링크의 제목을 바꿔버린다 -->
<hr>
<h1>이미지 삽입하기</h1>
<a href="http://www.naver.com">
 <img src="00001.jpg" width="30%" height="30%" border="10">
</a>
<!-- <a> 사이에 img가 있으면 그것으로 링크를 걸어줄 수도 있다. -->
 <br>
 <img src="00001.jpg" alt="아기족제비?" width="100px" height="100px" border="10">
 
</body>
</html>
